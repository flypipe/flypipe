name: verification

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  pull_request:
    branches: [ "**" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Allow pipeline to be invoked from other pipelines
  workflow_call:

jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v3
        with:
          # Fetch all tags/branches to run diff-cover properly
          fetch-depth: 0

      - name: Setup docker compose
        run: |
          curl -L https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m) -o /usr/local/bin/docker-compose
          chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies

      - name: Run unit tests for scripts (calculate wheel version and changelogs)
        run: pytest scripts/*_test.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        id: extract_branch

      # Fork PRs have no origin/$GITHUB_HEAD_REF on the base repo; refs/pull/N/head always points at the PR tip.
      - name: Resolve git ref for version and changelog
        id: version_git_ref
        shell: bash
        run: |
          event="${{ github.event_name }}"
          pr_number="${{ github.event.pull_request.number }}"
          if { [ "$event" = "pull_request" ] || [ "$event" = "workflow_call" ]; } && [ -n "$pr_number" ]; then
            git fetch origin "+refs/pull/${pr_number}/head:refs/heads/ci-pr-head"
            echo "ref=ci-pr-head" >> "$GITHUB_OUTPUT"
          else
            echo "ref=origin/${{ steps.extract_branch.outputs.branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package version number (preview)
        run: |
          python scripts/calculate_version.py ${{ steps.version_git_ref.outputs.ref }}
      - name: Changelog (preview)
        run: python scripts/generate_changelog.py ${{ steps.version_git_ref.outputs.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run formatter on backend (black)
        run: make black-check

      - name: Run formatter on frontend (prettier)
        run: |
          cd frontend
          yarn prettier-check

      - name: Run linter (ruff)
        run: make lint

      - name: Run unit tests using Spark Session
        run: make coverage USE_SPARK_CONNECT=0

      - name: Run unit tests using Spark Connect Session
        run: make coverage USE_SPARK_CONNECT=1

      - name: Run unit tests using Sparkleframe Activate
        run: make test f=flypipe/tests/activate/sparkleframe_test.py